<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Manage your personal finances with real-time analytics and interactive charts. Compare income vs expenses effortlessly.">
  <meta name="keywords" content="financial dashboard, budget analytics, personal finance chart, expense breakdown">
  <meta name="view-transition" content="same-origin">
  <title>Dashboard | ExpenseTracker Analytics</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
</head>
<body class="bg-bg">
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">ExpenseTracker</div>
      <div class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="budget.html">Budget</a>
      </div>
      <div class="nav-user">
        <button id="theme-toggle"><span>☀️ Light</span></button>
        <span id="user-greeting">Welcome!</span>
        <button id="btn-logout" class="btn btn-outline btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="summary-cards">
      <div class="card summary-card border-income">
        <h3>Total Income</h3>
        <p id="total-income" class="amount text-income">₹0.00</p>
      </div>
      <div class="card summary-card border-expense">
        <h3>Total Expenses</h3>
        <p id="total-expense" class="amount text-expense">₹0.00</p>
      </div>
      <div class="card summary-card border-neutral">
        <h3>Balance</h3>
        <p id="total-balance" class="amount text-neutral">₹0.00</p>
      </div>
    </div>

    <div class="charts-container">
      <div class="card chart-card">
        <h3>Monthly Review</h3>
        <div class="chart-canvas-wrapper">
          <canvas id="barChart"></canvas>
        </div>
      </div>
      <div class="card chart-card">
        <h3>Expenses by Category</h3>
        <div class="chart-canvas-wrapper">
            <canvas id="doughnutChart"></canvas>
        </div>
      </div>
    </div>

    <div class="card mt-4">
      <div class="flex-between mb-4">
        <h3>Recent Transactions</h3>
        <a href="transactions.html" class="btn btn-sm btn-outline">View All</a>
      </div>
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Title</th>
              <th>Category</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="recent-transactions-list">
            <!-- Injected by JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- FAB for adding expense -->
  <button id="fab-add" class="fab">+</button>

  <!-- Add Expense Modal -->
  <div id="expense-modal" class="modal hidden">
    <div class="modal-content card">
      <div class="flex-between mb-4">
        <h2 id="modal-title">Add Transaction</h2>
        <button class="close-modal" aria-label="Close">&times;</button>
      </div>
      <form id="form-expense">
        <input type="hidden" id="exp-id">
        <div class="form-group">
          <label>Type</label>
          <select id="exp-type" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="exp-title" required>
        </div>
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="exp-amount" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="exp-category" required>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="exp-date" required>
        </div>
        <div class="form-group">
          <label>Note (Optional)</label>
          <textarea id="exp-note" rows="2" style="width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit;"></textarea>
        </div>
        <div id="exp-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary w-full">Save</button>
      </form>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>

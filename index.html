<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Securely track your personal finances, expenses, and monthly budgets with our advanced full-stack Expense Tracker.">
  <meta name="keywords" content="finance tracker, expense manager, budget planner, savings tracker, PWA">
  <meta name="view-transition" content="same-origin">
  <title>Login | ExpenseTracker - Master Your Finances</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
</head>
<body class="bg-surface flex-center min-h-screen" style="position: relative;">
  <button id="theme-toggle" style="position: absolute; top: 1rem; right: 1rem; z-index: 100;"><span>☀️ Light</span></button>
  <div class="auth-container card">
    <div class="auth-tabs">
      <button id="tab-login" class="auth-tab active">Login</button>
      <button id="tab-register" class="auth-tab">Register</button>
    </div>
    
    <div id="form-login-container" class="auth-form-container active">
      <h2>Welcome Back</h2>
      <p class="text-muted">Enter your details to access your account</p>
      <form id="form-login">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary w-full">Login</button>
      </form>
    </div>

    <div id="form-register-container" class="auth-form-container hidden">
      <h2>Create Account</h2>
      <p class="text-muted">Start tracking your expenses today</p>
      <form id="form-register">
        <div class="form-group">
          <label for="reg-name">Name</label>
          <input type="text" id="reg-name" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" required>
        </div>
        <div class="form-group">
          <label for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" required>
        </div>
        <div id="reg-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary w-full">Register</button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
